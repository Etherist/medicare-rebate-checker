# Tox configuration for multi-Python version testing
# Run with: tox

[tox]
# Python versions to test
envlist =
    py310,
    py311,
    py312,
    lint,
    typecheck,
    security

# Skip missing interpreters
skip_missing_interpreters = true

[testenv]
# Base configuration used by all environments
deps =
    pytest
    pytest-cov
    pytest-asyncio
    fastapi[all]
    streamlit

commands =
    pytest tests/ -v --cov=src --cov-report=term-missing

[testenv:py310]
basepython = python3.10
deps =
    {[testenv]deps}

[testenv:py311]
basepython = python3.11
deps =
    {[testenv]deps}

[testenv:py312]
basepython = python3.12
deps =
    {[testenv]deps}

# Linting environment
[testenv:lint]
basepython = python3.12
skip_install = true
deps =
    ruff
    black
    isort
commands =
    black --check src/ tests/
    isort --check-only src/ tests/
    ruff check src/ tests/

# Type checking environment
[testenv:typecheck]
basepython = python3.12
skip_install = true
deps =
    mypy
    fastapi
    pydantic
    pytest
commands =
    mypy src/ --ignore-missing-imports --strict

# Security scanning environment
[testenv:security]
basepython = python3.12
skip_install = true
deps =
    bandit
    safety
    pip-audit
commands =
    bandit -r src/ -llx
    safety check --full-report
    pip-audit

[gh-actions]
# Configuration for GitHub Actions matrix
python =
    3.10: py310
    3.11: py311
    3.12: py312