# Docker Compose for production deployment
version: '3.8'

services:
  # Redis cache cluster (production-ready with password)
  redis:
    image: redis:7-alpine
    container_name: medicare-checker-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-ChangeMeNow123!}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - medicare-network
    deploy:
      resources:
        limits:
          memory: 512M

  # FastAPI application (production)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: medicare-checker-api-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=WARNING
      - MBS_CACHE_ENABLED=true
      - MBS_CACHE_REDIS_URL=redis://:$${REDIS_PASSWORD}@redis:6379
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=3600
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - medicare-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
      replicas: 2

  # Nginx reverse proxy (optional, for SSL termination)
  nginx:
    image: nginx:alpine
    container_name: medicare-checker-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - medicare-network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis_data:
    driver: local

networks:
  medicare-network:
    driver: bridge

secrets:
  redis_password:
    file: ./secrets/redis_password.txt